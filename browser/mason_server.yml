name: mason_environment
channels:
  - conda-forge
  - bioconda
  - r
  - defaults
dependencies:
  # Python
  - python >=3.12
  - flask >=3.0
  - flask-wtf
  - biopython
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - shap
  - openpyxl
  # R
  - r-base >=4.3
  - r-ggplot2
  - r-dplyr
  - r-readr
  - r-kableextra
  - r-viridis
  - r-writexl
  - bioconductor-rmelting
  # ML dependencies
  - numba
  # CLI tools
  - bedtools
  - seqmap
  - bioawk
  - emboss
  - viennarna
  - openjdk >=11
  # pip dependencies
  - pip:
    - cdifflib
